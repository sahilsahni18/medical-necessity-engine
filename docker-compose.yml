services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mna
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mna"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mna
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GENERATION_MODEL: ${GENERATION_MODEL:-gemini-2.5-flash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-004}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
    ports:
      - "8000:8000"

volumes:
  pgdata:
